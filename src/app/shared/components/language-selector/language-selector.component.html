<div class="relative" (appClickOutside)="isOpen.set(false)">
  <button
    type="button"
    (click)="isOpen.set(!isOpen())"
    class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border dark:border-slate-800
           text-sm font-medium text-text-primary dark:text-white bg-white dark:bg-slate-900 hover:bg-surface dark:hover:bg-slate-800 transition-all active:scale-95 shadow-sm"
    aria-haspopup="listbox"
    [attr.aria-expanded]="isOpen()"
  >
    <span>{{ currentLang().flag }}</span>
    <span class="hidden md:inline">{{ currentLang().label }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-text-secondary dark:text-slate-500" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  @if (isOpen()) {
    <ul
      class="absolute right-0 mt-2 w-36 bg-white dark:bg-slate-900 border border-border dark:border-slate-800 rounded-xl shadow-xl z-[100] py-1 overflow-hidden animate-pop-in"
      role="listbox"
    >
      @for (lang of languages; track lang.code) {
        <li
          role="option"
          [attr.aria-selected]="i18nService.currentLang() === lang.code"
          (click)="select(lang.code)"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-text-primary dark:text-slate-300
                 hover:bg-surface dark:hover:bg-slate-800 cursor-pointer transition-colors"
          [class.font-bold]="i18nService.currentLang() === lang.code"
          [class.text-primary]="i18nService.currentLang() === lang.code"
        >
          <span class="text-lg">{{ lang.flag }}</span>
          <span>{{ lang.label }}</span>
          @if (i18nService.currentLang() === lang.code) {
            <span class="ml-auto text-primary text-xs">✓</span>
          }
        </li>
      }
    </ul>
  }
</div>
